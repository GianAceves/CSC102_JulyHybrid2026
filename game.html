<!DOCTYPE html>
<!-- Gian Aceves CSC102_JulyHybrid2026 -->
<!-- Declares this document as HTML5 -->
<html lang="en">

<head>
    <!-- Character encoding for proper text display -->
    <meta charset="UTF-8">
    <!-- Makes the page responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title shown in the browser tab -->
    <title>Dice Duel & Palindrome Checker</title>
    <style>
        /* Basic page styling, kept inside style tag (not JS) */
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f4f4f9;
            color: #222;
        }

        h1 {
            text-align: center;
        }

        section {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        button {
            padding: 8px 16px;
            font-size: 1em;
            cursor: pointer;
        }

        input[type="text"] {
            padding: 6px;
            font-size: 1em;
            margin-right: 8px;
        }

        #diceOutput,
        #palindromeOutput {
            margin-top: 15px;
            min-height: 20px;
        }
    </style>
</head>

<body>

    <!-- Main page heading -->
    <h1>Dice Duel & Palindrome Checker</h1>

    <!-- ===================== GAME SECTION ===================== -->
    <section>
        <h2>Dice Duel</h2>
        <p>Roll two dice. A prime sum wins big, matching dice (doubles) win,
            a high non-matching sum pushes, anything else loses.</p>

        <!-- Form used to trigger the game; submit button plays the round -->
        <!-- onsubmit calls playDiceGame() and returns false so the page does not reload -->
        <form onsubmit="return playDiceGame();">
            <button type="submit">Roll the Dice</button>
        </form>

        <!-- All game output is written here via innerHTML from code.js -->
        <div id="diceOutput"></div>
    </section>

    <!-- ================= PALINDROME CHECKER SECTION ================= -->
    <section>
        <h2>Palindrome Checker</h2>
        <p>Enter a word or phrase to see if it reads the same backwards.</p>

        <!-- Form collects user text input; submit triggers the checker -->
        <!-- onsubmit calls handlePalindromeSubmit() and returns false to stop page reload -->
        <form onsubmit="return handlePalindromeSubmit();">
            <label for="wordInput">Word or phrase:</label>
            <input type="text" id="wordInput" name="wordInput">
            <button type="submit">Check Palindrome</button>
        </form>

        <!-- Validation and result messages are written here via innerHTML -->
        <div id="palindromeOutput"></div>
    </section>

    <!-- Links the external JavaScript file; no JS logic lives in this HTML file -->
    <script src="code.js"></script>
</body>

</html>
